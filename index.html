<!DOCTYPE html>
<html>
<head>
    <title>My First X3D Cube</title>
    <!-- Include X3DOM CSS and JavaScript -->
    <link rel='stylesheet' type='text/css' href='https://x3dom.org'>
    <script type='text/javascript' src='https://x3dom.org'></script>
</head>
<body>
    <h1>X3D Cube on GitHub</h1>
    <p>Click and drag to rotate the cube.</p>

    <x3d width='500px' height='400px'>
        <scene>
            <transform translation='0 0 0'>
                <shape>
                    <appearance>
                        <material diffuseColor='0.8 0.2 0.2'></material>
                    </appearance>
                    <box size='2 2 2'></box>
                </shape>
            </transform>
        </scene>
    </x3d>
</body>
</html>
