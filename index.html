<!DOCTYPE html>
<html>
<head>
    <title>X3D Model Viewer</title>
    <script type="text/javascript" src="https://x3dom.org"></script>
    <link rel='stylesheet' type='text/css' href='https://x3dom.org' />
</head>
<body style="margin:0; overflow:hidden;">
    <x3d width="100%" height="100vh">
        <scene>
            <!-- Replace model.x3d with the exact name of your X3D file -->
            <inline url="model.x3d"></inline>
        </scene>
    </x3d>
</body>
</html>
